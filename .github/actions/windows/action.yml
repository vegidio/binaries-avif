name: "windows"

# Pinned upstream versions — bump these to upgrade.
# vcpkg release tag: 2026.06.01
# libavif release tag: v1.4.2

inputs:
  arch:
    description: "Target architecture suffix (e.g. x64, arm64)"
    required: true
  msystem:
    description: "MSYS2 environment (e.g. MINGW64, CLANGARM64)"
    required: true
  packages:
    description: "MSYS2 packages to install (newline-separated)"
    required: true
  triplet-prefix:
    description: "vcpkg triplet prefix (e.g. x64-mingw); -static and -dynamic are derived from it"
    required: true

runs:
  using: composite
  steps:
    - name: Install NASM
      uses: ilammy/setup-nasm@v1

    - name: Install MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ inputs.msystem }}
        update: true
        install: ${{ inputs.packages }}

    - name: Cache vcpkg binaries
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg_cache
        key: vcpkg-${{ runner.os }}-${{ inputs.triplet-prefix }}-2026.06.01

    - name: Install vcpkg
      shell: bash
      run: |
        mkdir -p $GITHUB_WORKSPACE/static_${{ inputs.arch }}/lib
        mkdir -p $GITHUB_WORKSPACE/dynamic_${{ inputs.arch }}/lib
        mkdir -p $GITHUB_WORKSPACE/vcpkg_cache
        git clone --depth 1 --branch 2026.06.01 https://github.com/microsoft/vcpkg builder
        ./builder/bootstrap-vcpkg.sh

    - name: Build libyuv, dav1d & svt-av1
      shell: msys2 {0}
      env:
        MSYS2_PATH_TYPE: inherit
        VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_cache
      run: |
        ./builder/vcpkg install "libyuv:${{ inputs.triplet-prefix }}-static"
        ./builder/vcpkg install "dav1d:${{ inputs.triplet-prefix }}-static"
        ./builder/vcpkg install "svt-av1:${{ inputs.triplet-prefix }}-static"

        ./builder/vcpkg install "libyuv:${{ inputs.triplet-prefix }}-dynamic"
        ./builder/vcpkg install "dav1d:${{ inputs.triplet-prefix }}-dynamic"
        ./builder/vcpkg install "svt-av1:${{ inputs.triplet-prefix }}-dynamic"

    - name: Prepare dependencies
      shell: bash
      run: |
        cp -r $GITHUB_WORKSPACE/builder/installed/${{ inputs.triplet-prefix }}-static/include $GITHUB_WORKSPACE/static_${{ inputs.arch }}/
        for file in "$GITHUB_WORKSPACE"/builder/installed/${{ inputs.triplet-prefix }}-static/lib/*.a; do
          cp "$file" "$GITHUB_WORKSPACE/static_${{ inputs.arch }}/lib/"
        done

        cp -r $GITHUB_WORKSPACE/builder/installed/${{ inputs.triplet-prefix }}-dynamic/include $GITHUB_WORKSPACE/dynamic_${{ inputs.arch }}/
        for file in "$GITHUB_WORKSPACE"/builder/installed/${{ inputs.triplet-prefix }}-dynamic/lib/*.dll.a; do
          cp "$file" "$GITHUB_WORKSPACE/dynamic_${{ inputs.arch }}/lib/"
        done

        for file in "$GITHUB_WORKSPACE"/builder/installed/${{ inputs.triplet-prefix }}-dynamic/bin/*.dll; do
          cp "$file" "$GITHUB_WORKSPACE/dynamic_${{ inputs.arch }}/lib/"
        done

    - name: Build avif
      shell: msys2 {0}
      env:
        MSYS2_PATH_TYPE: inherit
        MSYSTEM: ${{ inputs.msystem }}
      run: |
        git clone --depth 1 --branch v1.4.2 https://github.com/AOMediaCodec/libavif avif
        cp -r $GITHUB_WORKSPACE/avif $GITHUB_WORKSPACE/avif_dynamic

        mkdir -p $GITHUB_WORKSPACE/avif/build
        cd $GITHUB_WORKSPACE/avif/build
        cmake -G "MinGW Makefiles" -DBUILD_SHARED_LIBS=OFF -DAVIF_BUILD_APPS=OFF -DAVIF_CODEC_DAV1D=SYSTEM -DAVIF_CODEC_SVT=SYSTEM -DAVIF_LIBYUV=SYSTEM -DCMAKE_PREFIX_PATH=$GITHUB_WORKSPACE/static_${{ inputs.arch }} ..
        cmake --build . --parallel

        mkdir -p $GITHUB_WORKSPACE/avif_dynamic/build
        cd $GITHUB_WORKSPACE/avif_dynamic/build
        cmake -G "MinGW Makefiles" -DAVIF_BUILD_APPS=OFF -DAVIF_CODEC_DAV1D=SYSTEM -DAVIF_CODEC_SVT=SYSTEM -DAVIF_LIBYUV=SYSTEM -DCMAKE_PREFIX_PATH=$GITHUB_WORKSPACE/dynamic_${{ inputs.arch }} ..
        cmake --build . --parallel

    - name: Prepare local
      shell: bash
      run: |
        mv $GITHUB_WORKSPACE/static_${{ inputs.arch }}/lib/libSvtAv1Enc.a $GITHUB_WORKSPACE/static_${{ inputs.arch }}/lib/libsvtav1.a
        cp -r "$GITHUB_WORKSPACE"/avif/include/avif "$GITHUB_WORKSPACE"/static_${{ inputs.arch }}/include/
        cp "$GITHUB_WORKSPACE"/avif/build/libavif.a "$GITHUB_WORKSPACE"/static_${{ inputs.arch }}/lib/libavif.a

        mv $GITHUB_WORKSPACE/dynamic_${{ inputs.arch }}/lib/libSvtAv1Enc.dll $GITHUB_WORKSPACE/dynamic_${{ inputs.arch }}/lib/libsvtav1.dll
        cp -r "$GITHUB_WORKSPACE"/avif_dynamic/include/avif "$GITHUB_WORKSPACE"/dynamic_${{ inputs.arch }}/include/
        cp "$GITHUB_WORKSPACE"/avif_dynamic/build/libavif.dll "$GITHUB_WORKSPACE"/dynamic_${{ inputs.arch }}/lib/libavif.dll
        rm "$GITHUB_WORKSPACE"/dynamic_${{ inputs.arch }}/lib/*.dll.a

    - name: Zip local
      shell: bash
      run: |
        cd $GITHUB_WORKSPACE/static_${{ inputs.arch }}
        7z a -tzip -mx=9 $GITHUB_WORKSPACE/static_windows_${{ inputs.arch }}.zip include lib

        cd $GITHUB_WORKSPACE/dynamic_${{ inputs.arch }}
        7z a -tzip -mx=9 $GITHUB_WORKSPACE/dynamic_windows_${{ inputs.arch }}.zip include lib

    - name: Save artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries-windows-${{ inputs.arch }}
        path: "*.zip"
